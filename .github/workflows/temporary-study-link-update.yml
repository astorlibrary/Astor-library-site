name: Temporary study link update

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-study-links:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch study links and introduced edition
        run: |
          python3 <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          import os

          root = Path('.')
          root_files = {p.name for p in root.iterdir() if p.is_file()}

          editions = [
              ('books/jekyll-and-hyde/index.html', 'Jekyll and Hyde', 'Jekyll and Hyde Study.png', 'https://mybook.to/ddk9RnO', 'Summaries, context, quotations, critics and model paragraphs for the Study Edition.'),
              ('books/a-midsummer-nights-dream/index.html', 'A Midsummer Night’s Dream', "Midsummer Night's Dream Study.png", 'https://mybook.to/tih5', 'Scene support, comedy, love, magic, performance and exam-ready study material.'),
              ('books/great-expectations/index.html', 'Great Expectations', 'Great Expectations Study.png', 'https://mybook.to/jAoMkeE', 'Chapter support, context, quotations, critics and model paragraphs for Dickens’s novel.'),
              ('books/macbeth/index.html', 'Macbeth', 'Macbeth Study.png', 'https://mybook.to/cntRBz', 'Scene support, context, quotations, critics and model paragraphs for the tragedy.'),
              ('books/hamlet/index.html', 'Hamlet', 'Hamlet Study.png', 'https://mybook.to/Q1lrp8', 'Scene support, soliloquies, revenge, corruption, critics and model paragraphs.'),
              ('books/frankenstein/index.html', 'Frankenstein', 'Frankenstein Study.png', 'https://mybook.to/uGEUdh', 'Context, narrative structure, responsibility, isolation, quotations and essay support.'),
              ('books/dracula/index.html', 'Dracula', 'Dracula Study.png', 'https://mybook.to/xGiajwx', 'Gothic context, documents, gender, science, religion, empire and essay support.'),
              ('books/moby-dick/index.html', 'Moby-Dick', 'Moby Dick Study.png', 'https://mybook.to/VCYoiwF', 'Narrative voice, symbolism, Ahab, Ishmael, whaling context and essay support.'),
              ('books/dorian-gray/index.html', 'The Picture of Dorian Gray', 'Picture of Dorian Gray Study.png', 'https://mybook.to/BMP2uu', 'Aestheticism, influence, morality, doubling, epigrams, critics and model paragraphs.'),
              ('books/king-lear/index.html', 'King Lear', 'King Lear Study.png', 'https://mybook.to/yIeXaP', 'Scene support, power, family, madness, sight, justice and tragic structure.'),
              ('books/richard-iii/index.html', 'Richard III', 'Richard III Study.png', 'https://mybook.to/bqGB', 'Rhetoric, villainy, performance, prophecy, conscience and Shakespeare history support.'),
              ('books/othello/index.html', 'Othello', 'Othello Study.png', 'https://mybook.to/A8uO', 'Jealousy, race, Iago, Desdemona, military honour, tragedy and essay support.'),
              ('books/julius-caesar/index.html', 'Julius Caesar', 'Julius Caesar Study.png', 'https://mybook.to/donom', 'Republic, rhetoric, assassination, Brutus, Antony and public persuasion.'),
              ('books/merry-wives-of-windsor/index.html', 'The Merry Wives of Windsor', 'Merry Wives of Windsor Study.png', 'https://mybook.to/dmYF3qO', 'Falstaff, domestic comedy, jealousy, disguise, Windsor and social order.'),
              ('books/the-tempest/index.html', 'The Tempest', 'The Tempest Study.png', 'https://mybook.to/pSaIay', 'Prospero, Ariel, Caliban, island power, masque, forgiveness and interpretation.'),
              ('books/much-ado-about-nothing/index.html', 'Much Ado About Nothing', 'Much Ado About Nothing Study.png', 'https://mybook.to/8DvAj', 'Beatrice, Benedick, Hero, Claudio, overhearing, shame and comedy.'),
              ('books/romeo-and-juliet/index.html', 'Romeo and Juliet', 'Romeo and Juliet Study.png', 'https://mybook.to/wwhLC', 'Love, fate, conflict, youth, haste, Mercutio, Tybalt and tragedy.'),
              ('books/tess-of-the-durbervilles/index.html', 'Tess of the d’Urbervilles', "Tess of the D'urbervilles Study.png", 'https://mybook.to/FSRJnn', 'Tess, Alec, Angel, class, rural labour, purity, fate and judgement.'),
              ('books/a-christmas-carol/index.html', 'A Christmas Carol', 'A Christmas Carol Study.png', 'https://mybook.to/OS3XKr', 'Stave support, Scrooge, Marley, poverty, redemption, time and Christmas.'),
          ]

          def rel_asset(filename):
              return '../../' + quote(filename)

          def insert_after_first_edition_card(html, block):
              idx = html.find('<article class="edition-card"')
              if idx == -1:
                  idx = html.find('<article class="edition-card')
              if idx != -1:
                  end = html.find('</article>', idx)
                  if end != -1:
                      end += len('</article>')
                      return html[:end] + '\n' + block + html[end:]
              marker = '</main>'
              return html.replace(marker, block + '\n' + marker, 1)

          changed = []
          for path, title, cover, link, desc in editions:
              p = root / path
              if not p.exists():
                  print('missing page', path)
                  continue
              html = p.read_text(encoding='utf-8')
              if 'study-edition-card' in html:
                  continue
              cover_attr = rel_asset(cover)
              block = f'''<article class="edition-card study-edition-card"><img src="{cover_attr}" alt="{title} Study Edition cover"><div><p class="year">Study edition</p><h2><em>{title}</em> Study Edition</h2><p>{desc}</p><div class="button-row"><a class="button primary" href="{link}">View the Study Edition</a><a class="button secondary" href="../../study/">All Study Editions</a></div></div></article>'''
              html2 = insert_after_first_edition_card(html, block)
              if html2 != html:
                  p.write_text(html2, encoding='utf-8')
                  changed.append(path)

          ge = root / 'books/great-expectations/index.html'
          if ge.exists():
              html = ge.read_text(encoding='utf-8')
              if 'introduced-edition-card' not in html:
                  candidates = [
                      'Great Expectations Introduced.png',
                      'Great Expectations introduced.png',
                      'Great Expectations Introduced Edition.png',
                      'Great Expectations introduced edition.png',
                      'Great Expectations Introduction.png',
                      'Great Expectations Edition.png',
                  ]
                  found = None
                  for c in candidates:
                      if c in root_files:
                          found = c
                          break
                  if found is None:
                      ge_files = sorted(f for f in root_files if 'Great Expectations' in f and f.lower().endswith(('.png', '.jpg', '.jpeg', '.webp')))
                      for f in ge_files:
                          if any(word in f.lower() for word in ('introduc', 'edition')) and 'Study' not in f:
                              found = f
                              break
                  if found is None:
                      print('introduced Great Expectations cover not found; using existing Great Expectations.png fallback')
                      found = 'Great Expectations.png'
                  intro = '''<article class="edition-card introduced-edition-card"><img src="''' + rel_asset(found) + '''" alt="Great Expectations introduced edition cover"><div><p class="year">Introduced edition</p><h2><em>Great Expectations</em>, introduced Astor Library edition</h2><p>The complete 1861 text of Charles Dickens’s <em>Great Expectations</em>, with new and original introductory material from Astor Library.</p><p>Pip is an orphan on the Kent marshes when a terrifying encounter with an escaped convict changes the course of his life. His visits to Miss Havisham’s decaying Satis House and his fascination with Estella lead him towards shame, ambition and a mistaken idea of gentility.</p><p>When an unknown benefactor gives Pip the chance to become a gentleman, he leaves the forge for London. The truth behind his fortune forces him to confront guilt, snobbery, loyalty, love and the real cost of ambition.</p><div class="button-row"><a class="button primary" href="https://mybook.to/vGrI">View introduced edition</a></div></div></article>'''
                  html2 = insert_after_first_edition_card(html, intro)
                  if html2 != html:
                      ge.write_text(html2, encoding='utf-8')
                      changed.append('books/great-expectations/index.html introduced')

          wf = root / '.github/workflows/temporary-study-link-update.yml'
          if wf.exists():
              wf.unlink()

          print('changed:', changed)
          PY
      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Add study edition links to book pages"
            git push
          else
            echo "No changes to commit"
          fi
